<div class="app-shell">
  <app-site-header
    [currentUser]="auth.currentUser"
    [notificationsOpen]="notificationsOpen"
    [unreadAlerts]="unreadAlerts"
    (toggleNotificationsRequested)="toggleNotifications()"
    (logoutRequested)="logout()"
  ></app-site-header>

  <section class="site-alert-shell" *ngIf="bannerEvent">
    <div class="site-alert" role="status" aria-live="polite">
      <div class="site-alert-copy">
        <strong>Upcoming Event Alert</strong>
        <p>{{ bannerMessage }}</p>
      </div>
      <div class="site-alert-actions">
        <a class="site-alert-link" [routerLink]="bannerRoute">{{ bannerLabel }}</a>
      </div>
    </div>
  </section>

  <main class="app-main" [class.is-route-changing]="isRouteChanging">
    <router-outlet></router-outlet>
  </main>

  <app-site-footer></app-site-footer>

  <app-notification-drawer
    [open]="notificationsOpen"
    (unreadCountChanged)="updateUnreadAlerts($event)"
    (closed)="closeNotifications()"
  ></app-notification-drawer>

  <button
    class="scroll-top-button"
    type="button"
    *ngIf="showScrollTop"
    (click)="scrollToTop()"
    aria-label="Back to top"
    title="Back to top"
  >
    &#8593;
  </button>
</div>
